  <style>
    /* Critical CSS for initial load */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'Inter', system-ui, sans-serif;
    }
    
    #root {
      width: 100%;
      min-height: 100%;
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }
    
    /* Prevent pull-to-refresh on mobile */
    body {
      overscroll-behavior-y: contain;
      touch-action: pan-x pan-y;
      -webkit-overflow-scrolling: touch;
    }
    
    /* Loading screen */
    .app-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #000000;
      z-index: 9999;
    }
    
    .app-loading__logo {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #ffffff;
      animation: pulse-glow 2s ease-in-out infinite;
    }
    
    @keyframes pulse-glow {
      0%, 100% {
        text-shadow: 0 0 30px rgba(255,255,255,0.8), 0 0 50px rgba(255,255,255,0.5);
        opacity: 0.8;
      }
      50% {
        text-shadow: 0 0 40px rgba(255,255,255,1), 0 0 70px rgba(255,255,255,0.7);
        opacity: 1;
      }
    }
    
    /* Safe area insets for notched devices */
    @supports (padding: max(0px)) {
      body {
        padding-top: max(0px, env(safe-area-inset-top));
        padding-bottom: max(0px, env(safe-area-inset-bottom));
        padding-left: max(0px, env(safe-area-inset-left));
        padding-right: max(0px, env(safe-area-inset-right));
      }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="app-loading" class="app-loading">
    <div class="app-loading__logo">KAYA</div>
  </div>
  
  <!-- App Root -->
  <div id="root"></div>
  
  <!-- Service Worker Registration -->
  <script>
    // Remove loading screen once app is loaded
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('app-loading');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.3s ease-out';
          setTimeout(() => loader.remove(), 300);
        }
      }, 500);
    });
    
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('[Kayurveda] Service Worker registered:', registration.scope);
            
            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('[Kayurveda] New version available. Please refresh.');
                  // You can show a notification to the user here
                }
              });
            });
          })
          .catch((error) => {
            console.error('[Kayurveda] Service Worker registration failed:', error);
          });
      });
    }
    
    // iOS PWA detection
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const isInStandaloneMode = ('standalone' in window.navigator) && (window.navigator.standalone);
    
    if (isIOS && !isInStandaloneMode) {
      console.log('[Kayurveda] Running in browser on iOS - Install prompt available');
    }
    
    // Android PWA install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      console.log('[Kayurveda] Install prompt available');
      // Store the event for later use (can trigger install from UI)
      window.installPrompt = deferredPrompt;
    });
    
    window.addEventListener('appinstalled', () => {
      console.log('[Kayurveda] App installed successfully');
      deferredPrompt = null;
    });
    
    // Prevent zoom on iOS
    document.addEventListener('gesturestart', function(e) {
      e.preventDefault();
    });
    
    // Handle viewport height for mobile browsers
    function setViewportHeight() {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    }
    
    setViewportHeight();
    window.addEventListener('resize', setViewportHeight);
    window.addEventListener('orientationchange', setViewportHeight);
    
    // Performance monitoring
    if ('performance' in window && 'PerformanceObserver' in window) {
      const observer = new PerformanceObserver((list) => {
        for (const entry of list.getEntries()) {
          if (entry.entryType === 'navigation') {
            console.log('[Kayurveda] Load time:', entry.loadEventEnd - entry.fetchStart, 'ms');
          }
        }
      });
      observer.observe({ entryTypes: ['navigation'] });
    }
  </script>
  
  <!-- Main App Script -->
  <script type="module" src="/src/main.tsx"></script>
</body>
